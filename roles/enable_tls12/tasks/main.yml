---
# Server 2012 / Server 2012 R2 default to TLS 1.0 / SSL 3.0 in SChannel.
# .NET-level "SchUseStrongCrypto" alone is insufficient — SChannel itself
# refuses TLS 1.2 unless the protocol-specific keys are enabled. This role
# applies the full Microsoft-recommended set:
#
#   1. Enable TLS 1.2 in SChannel (client + server)
#   2. Force .NET 4.x to use system-default TLS (which now includes 1.2)
#   3. Force .NET 2.0/3.5 to use strong crypto (Ansible's .NET pipeline may use this)
#   4. Force WinHTTP to default to TLS 1.1 + 1.2
#
# All 64-bit and 32-bit (Wow6432Node) variants are covered. A single reboot
# at the end picks up the SChannel changes for the whole OS.

- name: Enable TLS 1.2 client in SChannel
  ansible.windows.win_regedit:
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.2\Client'
    name: "{{ item }}"
    data: "{{ 1 if item == 'Enabled' else 0 }}"
    type: dword
    state: present
  loop:
    - Enabled
    - DisabledByDefault
  register: schannel_client

- name: Enable TLS 1.2 server in SChannel
  ansible.windows.win_regedit:
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.2\Server'
    name: "{{ item }}"
    data: "{{ 1 if item == 'Enabled' else 0 }}"
    type: dword
    state: present
  loop:
    - Enabled
    - DisabledByDefault
  register: schannel_server

- name: Force .NET 4.x to use system-default TLS protocols (64-bit and 32-bit)
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: 1
    type: dword
    state: present
  loop:
    - { path: 'HKLM:\SOFTWARE\Microsoft\.NETFramework\v4.0.30319',                name: SchUseStrongCrypto }
    - { path: 'HKLM:\SOFTWARE\Microsoft\.NETFramework\v4.0.30319',                name: SystemDefaultTlsVersions }
    - { path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\.NETFramework\v4.0.30319',    name: SchUseStrongCrypto }
    - { path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\.NETFramework\v4.0.30319',    name: SystemDefaultTlsVersions }
  register: dotnet4

- name: Force .NET 2.0/3.5 to use strong crypto (64-bit and 32-bit)
  ansible.windows.win_regedit:
    path: "{{ item }}"
    name: SchUseStrongCrypto
    data: 1
    type: dword
    state: present
  loop:
    - 'HKLM:\SOFTWARE\Microsoft\.NETFramework\v2.0.50727'
    - 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\.NETFramework\v2.0.50727'
  register: dotnet2

- name: Force WinHTTP DefaultSecureProtocols to TLS 1.1 + 1.2 (0x00000A00)
  ansible.windows.win_regedit:
    path: "{{ item }}"
    name: DefaultSecureProtocols
    data: 0x00000A00
    type: dword
    state: present
  loop:
    - 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings\WinHttp'
    - 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Internet Settings\WinHttp'
  register: winhttp

- name: Reboot once if any TLS registry value changed
  ansible.windows.win_reboot:
    reboot_timeout: 600
  when: schannel_client.changed or schannel_server.changed or
        dotnet4.changed or dotnet2.changed or winhttp.changed
