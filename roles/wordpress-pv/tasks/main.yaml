---
# tasks/main.yml

- name: Create Docker systemd service directory
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: '0755'

- name: Write docker http-proxy-conf
  ansible.builtin.template:
    src: http-proxy.conf.j2
    dest: /etc/systemd/system/docker.service.d/http-proxy.conf
    mode: '0644'
  register: proxy_config

- name: Configure Docker to use insecure registry
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
  register: daemon_config

- name: Reload systemd and restart Docker if proxy changed
  ansible.builtin.systemd:
    daemon_reload: yes
    name: docker
    state: restarted
  when: proxy_config.changed or daemon_config.changed

- name: Create docker-compose directory
  ansible.builtin.file:
    path: /opt/wordpress
    state: directory
    mode: '0755'

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/wordpress/docker-compose.yml

- name: Start WordPress container with docker-compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/wordpress
  register: compose_result
  changed_when: "'Started' in compose_result.stdout or 'Created' in compose_result.stdout"
