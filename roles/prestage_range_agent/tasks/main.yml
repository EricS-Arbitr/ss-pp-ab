---
# Server 2012 R2 cannot complete TLS 1.2 handshakes to the customer Nexus
# even after enabling TLS 1.2 in SChannel + .NET 4 + WinHTTP. Pre-staging the
# range-agent-bootstrap MSI from the controller (via WinRM, no HTTPS) bypasses
# the failing win_get_url in the upstream `common` role.
#
# By the time `common` runs `Check if RangeAgent Service Exists`, the service
# is already installed and the failing download/install tasks are skipped.
#
# Wrapped in block/rescue so a failure here does NOT abort the playbook for
# unrelated hosts — common's win_get_url path will still attempt the download
# and may succeed for hosts where TLS 1.2 actually does work end-to-end.

- block:
    - name: Ensure C:\temp staging directory exists
      ansible.windows.win_file:
        path: 'C:\temp'
        state: directory

    - name: Copy range-agent-bootstrap MSI from controller (TLS bypass)
      ansible.windows.win_copy:
        src: "{{ range_agent_bootstrap }}"
        dest: 'C:\temp\{{ range_agent_bootstrap }}'

    - name: Install range-agent-bootstrap
      ansible.windows.win_package:
        path: 'C:\temp\{{ range_agent_bootstrap }}'
        state: present

  rescue:
    - name: prestage_range_agent failed — falling back to common's download path
      ansible.builtin.debug:
        msg: >-
          prestage_range_agent failed on {{ inventory_hostname }};
          continuing playbook so common can attempt win_get_url. If that also
          fails, install RangeAgent manually on this host.
