---
# billing_site — Voltgrid Power customer billing portal on pp-www.
#
# Deploys a Flask + SQLite app and an nginx reverse-proxy that takes host
# port 80 and routes by Host: header. WordPress (deployed by wordpress-pv)
# is also reverse-proxied via the same shared `frontend` docker network.
# Requires the wordpress-pv overlay in this repo (which releases host port 80
# and joins the `frontend` network).

- name: Ensure billing stack directory exists
  ansible.builtin.file:
    path: /opt/billing
    state: directory
    mode: '0755'

- name: Ensure shared `frontend` docker network exists
  ansible.builtin.command:
    cmd: docker network create frontend
  register: net_create
  changed_when: net_create.rc == 0
  failed_when:
    - net_create.rc != 0
    - "'already exists' not in net_create.stderr"

- name: Sync Flask app source to /opt/billing/app
  ansible.builtin.copy:
    src: app/
    dest: /opt/billing/app/
    mode: preserve
  register: app_sync

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/billing/docker-compose.yml
    mode: '0644'
  register: compose_tmpl

- name: Render nginx default.conf for billing-proxy
  ansible.builtin.template:
    src: nginx-default.conf.j2
    dest: /opt/billing/nginx-default.conf
    mode: '0644'
  register: nginx_tmpl

# Build the Flask image up-front so `up -d` doesn't need to wait on a build.
# --pull keeps the python:3.11-slim base layer fresh between range refreshes.
- name: Build the billing image
  ansible.builtin.command:
    cmd: docker compose build --pull billing
    chdir: /opt/billing
  register: build_result
  changed_when: "'Building' in build_result.stdout or 'Building' in build_result.stderr"
  when: app_sync.changed or compose_tmpl.changed

- name: Bring up the billing stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/billing
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout or 'Recreated' in compose_up.stdout"

- name: Reload nginx-proxy if its config changed
  ansible.builtin.command:
    cmd: docker compose exec -T nginx-proxy nginx -s reload
    chdir: /opt/billing
  changed_when: false
  when: nginx_tmpl.changed
