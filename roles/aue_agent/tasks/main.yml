---
# Local override of upstream range-development-ansible/roles/aue_agent/.
# Adds a skip-if-installed gate to the download so Server 2012 R2 hosts that
# pre-staged the agent via roles/prestage_aue_agent/ don't trip the failing
# Nexus TLS handshake. The upstream `win_package` already has a creates_path
# guard, so the install step is idempotent on its own — only `win_get_url`
# needed the gate.
#
# Identical task behavior to upstream when AUE Agent is NOT already installed.

- name: Ensure Install Directory Exists
  ansible.windows.win_file:
    path: "C:\\temp"
    state: directory

- name: Check if AUE Agent is already installed
  ansible.windows.win_stat:
    path: 'C:\Program Files\AUEAgent'
  register: aue_already

- name: Download aue agent installer using win_get_url with proxy settings
  ansible.windows.win_get_url:
    url: "{{ aue_agent_installer }}"
    dest: "C:\\temp\\"
    method: GET
    follow_redirects: all
    use_proxy: yes
    proxy_url: "http://{{ inet_proxy_addr }}:{{ inet_proxy_port }}"
    proxy_use_default_credential: yes
    timeout: 300
    validate_certs: no
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.0.0 Safari/537.36"
  when: not aue_already.stat.exists

- name: Install aue agent
  ansible.windows.win_package:
    path: "C:\\temp\\{{ aue_agent }}"
    arguments: "/verysilent"
    state: present
    creates_path: "C:\\Program Files\\AUEAgent"
