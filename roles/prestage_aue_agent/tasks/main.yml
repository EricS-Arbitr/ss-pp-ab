---
# Server 2012 R2 cannot complete TLS 1.2 handshakes to the customer Nexus.
# Same pattern as prestage_range_agent: copy the AUE agent installer from the
# controller via WinRM (no HTTPS) and install it before the upstream aue_agent
# role runs. The override role at ss-pp-ab/roles/aue_agent/ adds a
# skip-if-installed check so the failing win_get_url is bypassed entirely.
#
# Wrapped in block/rescue so a failure here doesn't abort the playbook for
# unrelated hosts.

- block:
    - name: Ensure C:\temp staging directory exists
      ansible.windows.win_file:
        path: 'C:\temp'
        state: directory

    - name: Check if AUE Agent is already installed
      ansible.windows.win_stat:
        path: 'C:\Program Files\AUEAgent'
      register: aue_already

    - name: Copy AUE agent installer from controller (TLS bypass)
      ansible.windows.win_copy:
        src: "{{ aue_agent }}"
        dest: 'C:\temp\{{ aue_agent }}'
      when: not aue_already.stat.exists

    - name: Install AUE agent
      ansible.windows.win_package:
        path: 'C:\temp\{{ aue_agent }}'
        arguments: "/verysilent"
        state: present
        creates_path: 'C:\Program Files\AUEAgent'
      when: not aue_already.stat.exists

    - name: Note that AUE Agent was already present (skipping install)
      ansible.builtin.debug:
        msg: "AUE Agent already installed at C:\\Program Files\\AUEAgent; prestage skipped."
      when: aue_already.stat.exists

  rescue:
    - name: prestage_aue_agent failed — falling back to aue_agent role's download path
      ansible.builtin.debug:
        msg: >-
          prestage_aue_agent failed on {{ inventory_hostname }};
          continuing playbook so aue_agent role can attempt win_get_url.
          If that also fails, install AUE Agent manually on this host.
