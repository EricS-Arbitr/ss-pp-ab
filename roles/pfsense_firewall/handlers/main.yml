---
# Restart FRR cleanly. Uses pfSense's rc.d/frr wrapper if it works on this
# image; falls back to launching watchfrr directly if the wrapper still has
# the pfSense-side bugs we hit earlier (silent failure / protect arg bug).
- name: restart frr
  ansible.builtin.shell: |
    set -e
    if service frr onestop 2>&1 | grep -qE 'not running|Stopped'; then :; fi
    pkill -f watchfrr 2>/dev/null || true
    pkill -f bgpd 2>/dev/null || true
    pkill -f zebra 2>/dev/null || true
    sleep 1
    if ! service frr onestart >/tmp/frr_start.log 2>&1; then
      /usr/local/sbin/watchfrr -d -F traditional zebra bgpd
    fi
