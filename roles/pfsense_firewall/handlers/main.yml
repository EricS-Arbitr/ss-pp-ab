---
# Restart FRR cleanly. Bypasses pfSense's rc.d/frr wrapper and watchfrr
# entirely — both are broken on pfSense 2.8.1 (see UPSTREAM_FIXES.md
# 2026-06-04 entries). Launches zebra and bgpd directly.
- name: restart frr
  ansible.builtin.shell: |
    pkill -f watchfrr 2>/dev/null || true
    pkill -f bgpd 2>/dev/null || true
    pkill -f zebra 2>/dev/null || true
    rm -f /var/run/frr/*.pid
    sleep 1
    /usr/local/sbin/zebra -d -A 127.0.0.1 -s 90000000 -f /var/etc/frr/frr.conf
    sleep 1
    /usr/local/sbin/bgpd -d -A 127.0.0.1 -f /var/etc/frr/frr.conf
