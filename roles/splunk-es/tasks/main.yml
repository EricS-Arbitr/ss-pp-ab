---
# Overlay of the upstream splunk-es role.
# Differences vs. base:
#   1. Adds a second readiness probe that polls /services/admin/localapps —
#      the exact endpoint essinstall calls. /services/server/info responds
#      far earlier than localapps does on a freshly-installed Splunk, so
#      essinstall would fire while Splunk was still bootstrapping ES.
#   2. Wraps essinstall in a retry loop; even after localapps responds it
#      can intermittently time out during heavy datamodel/summary loading.

- name: Check Splunk Status
  ansible.builtin.systemd:
    name: splunk
    enabled: true
    state: started
  register: splunk_status

- name: Ensure Splunk Tmp Directory Exists
  ansible.builtin.file:
    path: "{{ staging_dir_linux }}/splunk"
    state: directory
    mode: '0755'
  register: tmp_directory_check

- name: Get Splunk Apps
  ansible.builtin.find:
    paths: "{{ ansible_installers }}/splunk/apps/"
    patterns: "*.tg*"
  delegate_to: localhost
  register: splunk_apps

- name: Copy Splunk Apps to Staging Directory
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ staging_dir_linux }}/splunk/apps/"
    mode: '0644'
  with_items: "{{ splunk_apps.files }}"
  when: splunk_apps.matched > 0

- name: Install Splunk Apps
  ansible.builtin.shell: >
    /opt/splunk/bin/splunk install app {{ staging_dir_linux }}/splunk/apps/{{ item.path | basename }}
    -auth {{ splunk_admin }}:{{ splunk_admin_password }} -update true
  with_items: "{{ splunk_apps.files }}"
  register: install_apps_result
  retries: 6
  delay: 20
  until: install_apps_result.rc == 0
  changed_when: install_apps_result.rc == 0

- name: Copy Enterprise Security App
  ansible.builtin.copy:
    src: "{{ ansible_installers }}/splunk/splunk-es.spl"
    dest: "{{ staging_dir_linux }}/splunk/"
    mode: '0644'
  register: copy_es_result

- name: Install Enterprise Security App
  ansible.builtin.shell: >
    /opt/splunk/bin/splunk install app {{ staging_dir_linux }}/splunk/splunk-es.spl
    -auth {{ splunk_admin }}:{{ splunk_admin_password }} -update true
  register: install_es_result
  retries: 6
  delay: 30
  until: install_es_result.rc == 0
  changed_when: false
  notify: Restart Splunk Service

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Wait for Splunk REST API to be fully ready
  ansible.builtin.uri:
    url: "https://127.0.0.1:8089/services/server/info"
    method: GET
    user: "{{ splunk_admin }}"
    password: "{{ splunk_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: splunk_api_check
  retries: 20
  delay: 15
  until: splunk_api_check.status == 200

# Pre-warm: essinstall calls /services/admin/localapps, which is heavy on a
# freshly-installed Splunk. Poll it directly with long retries so we don't
# fire essinstall before that endpoint is willing to answer.
- name: Wait for Splunk localapps endpoint to be responsive
  ansible.builtin.uri:
    url: "https://127.0.0.1:8089/services/admin/localapps?count=0"
    method: GET
    user: "{{ splunk_admin }}"
    password: "{{ splunk_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    timeout: 120
    status_code: 200
  register: splunk_localapps_check
  retries: 30
  delay: 30
  until: splunk_localapps_check.status == 200

- name: Configure Enterprise Security App
  ansible.builtin.shell: >
    set -o pipefail && /opt/splunk/bin/splunk search '| essinstall --ssl_enablement ignore'
    -auth {{ splunk_admin }}:{{ splunk_admin_password }}
  args:
    executable: /bin/bash
  register: configure_es_result
  changed_when: false
  retries: 3
  delay: 120
  until: configure_es_result.rc == 0
  notify: Restart Splunk Service

- name: Check Content Update Directory
  ansible.builtin.file:
    path: "/opt/splunk/etc/apps/DA-ESS-ContentUpdate/local/"
    state: directory
    mode: '0755'

- name: Check Endpoint Protection Directory
  ansible.builtin.file:
    path: "/opt/splunk/etc/apps/SA-EndpointProtection/local/"
    state: directory
    mode: '0755'

- name: Check CIM Directory
  ansible.builtin.file:
    path: "/opt/splunk/etc/apps/Splunk_SA_CIM/local/"
    state: directory
    mode: '0755'

- name: Check ES Directory
  ansible.builtin.file:
    path: "/opt/splunk/etc/apps/SplunkEnterpriseSecuritySuite/local/"
    state: directory
    mode: '0755'

- name: Copy Content Update Saved Searches
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/cu-savedsearches.conf.j2"
    dest: "/opt/splunk/etc/apps/DA-ESS-ContentUpdate/local/savedsearches.conf"
    mode: '0644'
  notify: Restart Splunk Service

- name: Copy Endpoint Protection Saved Searches
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/ep-savedsearches.conf.j2"
    dest: "/opt/splunk/etc/apps/SA-EndpointProtection/local/savedsearches.conf"
    mode: '0644'
  notify: Restart Splunk Service

- name: Copy CIM Macros
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/cim-macros.conf.j2"
    dest: "/opt/splunk/etc/apps/Splunk_SA_CIM/local/macros.conf"
    mode: '0644'
  notify: Restart Splunk Service

- name: Copy CIM Datamodels
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/cim-datamodels.conf.j2"
    dest: "/opt/splunk/etc/apps/Splunk_SA_CIM/local/datamodels.conf"
    mode: '0644'
  notify: Restart Splunk Service

- name: Copy ES Saved Searches
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/es-savedsearches.conf.j2"
    dest: "/opt/splunk/etc/apps/SplunkEnterpriseSecuritySuite/local/savedsearches.conf"
    mode: '0644'
  notify: Restart Splunk Service

- name: Copy Forwarding Script
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/stack_op_forwarder.py.j2"
    dest: "/opt/splunk/bin/scripts/stack_op_forwarder.py"
    mode: '0755'
  notify: Restart Splunk Service

- name: Make Directory
  ansible.builtin.file:
    path: "/opt/splunk/etc/users/admin/search/local"
    state: directory
    mode: '0755'
  notify: Restart Splunk Service

- name: Copy Alert Action
  ansible.builtin.copy:
    src: "/etc/ansible/templates/splunkapps/alert-savedsearches.conf.j2"
    dest: "/opt/splunk/etc/users/admin/search/local/savedsearches.conf"
    mode: '0644'
  notify: Restart Splunk Service

- name: Cleanup Staging Directory
  ansible.builtin.file:
    path: "{{ staging_dir_linux }}/splunk/apps/"
    state: absent
