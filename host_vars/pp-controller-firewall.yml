ansible_host: "10.255.240.198"

# SimSpace provisions: eth0 = first data-plane (shared with mgmt 10.255.240.198/20)
network_interfaces:
  - name: "eth0"                      # switch-6 transit to pp-ot-router (mgmt shares)
    ipv4:
      address: "172.16.1.9"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth1"                      # switch-7 transit to pp-ctrl-rtr
    ipv4:
      address: "172.16.1.18"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

bgp:
  - as: 65001
    neighbor:
      ip: "172.16.1.10"               # pp-ot-router
      as: 65001
  - as: 65001
    neighbor:
      ip: "172.16.1.17"               # pp-ctrl-rtr
      as: 65001
