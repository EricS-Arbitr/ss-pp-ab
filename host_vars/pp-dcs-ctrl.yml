ansible_host: 10.255.240.204
# OT-side Windows Server 2022. Domain member of voltgrid.com. Uses pp-dc03
# (the OT-side DC at 192.168.100.5) as primary DNS so a corp-side DC
# outage doesn't break local OT auth/resolution. Future scenario plans
# restrict cross-ESP traffic to DC-replication + RDP-to-the-control-wkstns,
# so pp-dcs-ctrl needs to authenticate locally to be resilient.
network_interfaces:
  - name: "Ethernet0"
    ipv4:
      address: "10.255.240.204"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"
    ipv4:
      address: "192.168.100.10"
      netmask: "255.255.255.0"
      gateway: "192.168.100.1"
    dns:
      - "192.168.100.5"
      - "172.16.2.7"
