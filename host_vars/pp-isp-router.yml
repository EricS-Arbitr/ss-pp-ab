ansible_host: "10.255.240.189"

# SimSpace provisions: eth0 = first data-plane (shared with mgmt 10.255.240.189/20)
network_interfaces:
  - name: "eth0"                      # switch-0 transit to pp-external-firewall (mgmt shares)
    ipv4:
      address: "75.21.1.2"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth1"                      # red-net (external/red-team sim)
    ipv4:
      address: "210.210.210.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth2"                      # PowerPlant-External-Placeholder (external sim)
    ipv4:
      address: "200.200.200.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true

static_route:
  route: "0.0.0.0/0"
  next_hop: "200.200.200.2"           # is-inet — owns all simulated public IP /32s on lo

# pp-external-firewall was migrated from VyOS to pfSense (static routing
# only), so the eBGP peering it used to advertise the corp + OT networks
# from is dead. Replace with explicit returns pointing back through the
# new pfSense at 75.21.1.1.
extra_static_routes:
  - network: "172.16.0.0/16"
    next_hop: "75.21.1.1"             # pp-external-firewall (pfSense)
    descr: "Corp 172.16.0.0/16 via pp-external-firewall"
  - network: "192.168.0.0/16"
    next_hop: "75.21.1.1"             # pp-external-firewall (pfSense)
    descr: "OT 192.168.0.0/16 via pp-external-firewall"

# SimSpace's VyOS image bakes a stale `0.0.0.0/0` for each of this host's
# /24 interface IPs (eth1=210.210.210.1 red-net, eth2=200.200.200.1
# ext-placeholder). Same self-loop pattern as pp-internal-router — strip so
# only the real default (0.0.0.0/0 → 200.200.200.2 is-inet) remains.
# See UPSTREAM_FIXES.md (2026-05-27 entry).
extra_static_routes_remove:
  - network: "0.0.0.0/0"
    next_hop: "200.200.200.1"         # own eth2 IP (self-loop)
  - network: "0.0.0.0/0"
    next_hop: "210.210.210.1"         # own eth1 IP (self-loop)

# BGP peer is stale (pp-external-firewall is now pfSense, no BGP). Left in
# place — session just fails to form; reachability comes from the statics
# above. Remove once we're sure nothing else relies on it being declared.
bgp:
  - as: 65002
    neighbor:
      ip: "75.21.1.1"                 # pp-external-firewall (AS 65001 — internal)
      as: 65001
