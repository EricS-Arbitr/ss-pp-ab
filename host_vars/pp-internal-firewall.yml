ansible_host: "10.255.240.197"

# pfSense 2.8.1 on the new SimSpace pfSense image. NIC ordering (image
# default):
#   vmx0 → mgmt (DHCP from SimSpace platform, becomes 10.255.240.197/20)
#   vmx1 → WAN  (DHCP default, reconfigured static by pfsense_interface)
#   vmx2 → INTERNAL transit toward pp-internal-router
#
# Sits between site-edge-router (toward pp-external-firewall + the ISP)
# and pp-internal-router (the corp/OT downstream hub).
#
# Routing runs on FRR. iBGP peers with site-edge-router (.17) and
# pp-internal-router (.26); redistribute connected propagates the two
# /30 transits.

pfsense_hostname: "pp-internal-firewall"
pfsense_domain: "voltgrid.com"

pfsense_interfaces:
  - descr: "WAN_EDGE"            # vmx1 — switch-2 transit to site-edge-router
    interface: vmx1
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.0.18"
    ipv4_prefixlen: 30
    blockpriv: false
    blockbogons: false

  - descr: "INTERNAL"            # vmx2 — switch-3 transit to pp-internal-router
    interface: vmx2
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.0.25"
    ipv4_prefixlen: 30

pfsense_default_gw_name: "GW_EDGE"

pfsense_gateways:
  - name: "GW_EDGE"
    interface: "WAN_EDGE"
    gateway: "172.16.0.17"       # site-edge-router
  - name: "GW_INT_ROUTER"
    interface: "INTERNAL"
    gateway: "172.16.0.26"       # pp-internal-router

# Per-/24 corp + OT statics inward toward pp-internal-router.
#
# We tried to rely on iBGP carrying these (since pp-internal-router peers
# with pp-corp-router and learns 172.16.2-6.0/24 + 172.16.9.0/24 via
# iBGP + redistribute-connected). But pp-internal-router does NOT
# re-advertise iBGP-learned routes to its other iBGP neighbors (standard
# iBGP no-readvertise rule, see RFC 4271 §9.2). Without a BGP route
# reflector configured on pp-internal-router, this firewall never sees
# the corp /24s in its BGP table — corp-bound traffic falls through to
# the default route and exits toward the ISP. pp-syslog (172.16.2.9) is
# unreachable.
#
# Belt-and-suspenders fix: per-/24 statics here. The "correct" fix is
# `set protocols bgp neighbor X.X.X.X route-reflector-client` on
# pp-internal-router's peers in the customer vyos role — logged in
# UPSTREAM_FIXES.md.
pfsense_routes:
  - network: "172.16.2.0/24"
    gateway: "GW_INT_ROUTER"
    descr: "Corp PP-Services via pp-internal-router (iBGP no-readvertise)"
  - network: "172.16.3.0/24"
    gateway: "GW_INT_ROUTER"
    descr: "Corp BP via pp-internal-router"
  - network: "172.16.4.0/24"
    gateway: "GW_INT_ROUTER"
    descr: "Corp Eng via pp-internal-router"
  - network: "172.16.5.0/24"
    gateway: "GW_INT_ROUTER"
    descr: "Corp LS via pp-internal-router"
  - network: "172.16.6.0/24"
    gateway: "GW_INT_ROUTER"
    descr: "Corp IS via pp-internal-router"
  - network: "172.16.9.0/24"
    gateway: "GW_INT_ROUTER"
    descr: "Security via pp-internal-router"
  - network: "192.168.0.0/16"
    gateway: "GW_INT_ROUTER"
    descr: "OT umbrella via pp-internal-router"

pfsense_rules:
  - name: "Allow any on WAN_EDGE (lab)"
    interface: "WAN_EDGE"
  - name: "Allow any on INTERNAL (lab)"
    interface: "INTERNAL"

pfsense_bgp:
  asn: 65001
  router_id: "172.16.0.18"
  neighbors:
    - peer_ip: "172.16.0.17"
      remote_as: 65001
      description: "site-edge-router"
    - peer_ip: "172.16.0.26"
      remote_as: 65001
      description: "pp-internal-router"
