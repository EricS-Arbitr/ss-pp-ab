ansible_host: "10.255.240.197"

network_interfaces:
  - name: "eth0"                      # management
    ipv4:
      address: "10.255.240.197"
      netmask: "255.255.240.0"
      type: "ethernet"
  - name: "eth1"                      # switch-2 transit to site-edge-router
    ipv4:
      address: "172.16.0.18"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth2"                      # switch-3 transit to pp-internal-router
    ipv4:
      address: "172.16.0.25"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

bgp:
  - as: 65001
    neighbor:
      ip: "172.16.0.17"               # site-edge-router
      as: 65001
  - as: 65001
    neighbor:
      ip: "172.16.0.26"               # pp-internal-router
      as: 65001
