ansible_host: "10.255.240.197"

# SimSpace provisions: eth0 = first data-plane (shared with mgmt 10.255.240.197/20)
network_interfaces:
  - name: "eth0"                      # switch-2 transit to site-edge-router (mgmt shares)
    ipv4:
      address: "172.16.0.18"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth1"                      # switch-3 transit to pp-internal-router
    ipv4:
      address: "172.16.0.25"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

bgp:
  - as: 65001
    neighbor:
      ip: "172.16.0.17"               # site-edge-router
      as: 65001
  - as: 65001
    neighbor:
      ip: "172.16.0.26"               # pp-internal-router
      as: 65001
