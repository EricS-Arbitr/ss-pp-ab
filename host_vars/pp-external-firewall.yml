ansible_host: "10.255.240.191"

# pfSense 2.8.1 on the new SimSpace pfSense image. NIC ordering (image
# default):
#   vmx0 → mgmt (DHCP from SimSpace platform, becomes 10.255.240.191/20)
#   vmx1 → WAN_ISP (DHCP default; reconfigured static toward pp-isp-router)
#   vmx2 → DMZ (172.16.8.0/24 gateway)
#   vmx3 → EDGE_TRANSIT (transit /30 toward site-edge-router)
#
# Sits at the corp edge: eBGP peer (AS 65001 ↔ AS 65002) with pp-isp-router
# over 75.21.1.0/30, iBGP peer with site-edge-router. Outbound NAT is
# disabled (transit mode) — pp-isp-router-side simulated public IPs already
# look like internet to is-inet.

pfsense_hostname: "pp-external-firewall"
pfsense_domain: "voltgrid.com"

pfsense_interfaces:
  - descr: "WAN_ISP"             # vmx1 — switch-0 transit to pp-isp-router
    interface: vmx1
    enable: true
    ipv4_type: static
    ipv4_address: "75.21.1.1"
    ipv4_prefixlen: 30
    blockpriv: false
    blockbogons: false

  - descr: "DMZ"                 # vmx2 — PP-DMZ subnet gateway
    interface: vmx2
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.8.1"
    ipv4_prefixlen: 24

  - descr: "EDGE_TRANSIT"        # vmx3 — switch-1 transit to site-edge-router
    interface: vmx3
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.0.9"
    ipv4_prefixlen: 30

pfsense_default_gw_name: "GW_ISP"

pfsense_gateways:
  - name: "GW_ISP"
    interface: "WAN_ISP"
    gateway: "75.21.1.2"         # pp-isp-router
  - name: "GW_EDGE_TRANSIT"
    interface: "EDGE_TRANSIT"
    gateway: "172.16.0.10"       # site-edge-router

# Per-/24 statics inward via site-edge-router.
#
# Same iBGP-no-readvertise issue as pp-internal-firewall (see comment there
# and UPSTREAM_FIXES.md). pp-external-firewall's default route exits via
# pp-isp-router (eBGP), so corp-bound traffic doesn't naturally take the
# inward path through site-edge → pp-internal-firewall → pp-internal-router.
# These statics force the corp/OT prefixes inward via GW_EDGE_TRANSIT
# (site-edge-router, which has its own statics pointing further inward).
pfsense_routes:
  - network: "172.16.2.0/24"
    gateway: "GW_EDGE_TRANSIT"
    descr: "Corp PP-Services via site-edge-router (iBGP no-readvertise)"
  - network: "172.16.3.0/24"
    gateway: "GW_EDGE_TRANSIT"
    descr: "Corp BP via site-edge-router"
  - network: "172.16.4.0/24"
    gateway: "GW_EDGE_TRANSIT"
    descr: "Corp Eng via site-edge-router"
  - network: "172.16.5.0/24"
    gateway: "GW_EDGE_TRANSIT"
    descr: "Corp LS via site-edge-router"
  - network: "172.16.6.0/24"
    gateway: "GW_EDGE_TRANSIT"
    descr: "Corp IS via site-edge-router"
  - network: "172.16.9.0/24"
    gateway: "GW_EDGE_TRANSIT"
    descr: "Security via site-edge-router"
  - network: "192.168.0.0/16"
    gateway: "GW_EDGE_TRANSIT"
    descr: "OT umbrella via site-edge-router"

pfsense_rules:
  - name: "Allow any on WAN_ISP (lab)"
    interface: "WAN_ISP"
  - name: "Allow any on DMZ (lab)"
    interface: "DMZ"
  - name: "Allow any on EDGE_TRANSIT (lab)"
    interface: "EDGE_TRANSIT"

# AS 65001 (internal) iBGP to site-edge-router, AS 65002 eBGP to
# pp-isp-router. Redistribute connected announces the local /24 (DMZ) and
# /30 transits into the mesh.
pfsense_bgp:
  asn: 65001
  router_id: "172.16.0.9"
  neighbors:
    - peer_ip: "172.16.0.10"
      remote_as: 65001
      description: "site-edge-router (iBGP)"
    - peer_ip: "75.21.1.2"
      remote_as: 65002
      description: "pp-isp-router (eBGP)"
