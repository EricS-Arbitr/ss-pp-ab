ansible_host: "10.255.240.191"

# pfSense 2.8.1 on the new SimSpace pfSense image. NIC ordering:
#   vmx0 → mgmt (DHCP, 10.255.240.191/20)
#   vmx1 → WAN_ISP (75.21.1.1/30 toward pp-isp-router)
#   vmx2 → DMZ (172.16.8.1/24 PP-DMZ gateway)
#   vmx3 → EDGE_TRANSIT (172.16.0.9/30 toward site-edge-router)
#
# Corp edge router (post-2026-06-10 architectural shift):
#   - **eBGP** AS 65001 ↔ AS 65002 to pp-isp-router on vmx1 (WAN). This is
#     the ONLY BGP session in the network now.
#   - **OSPF area 0** on vmx2 (DMZ) and vmx3 (EDGE_TRANSIT) — the IGP for
#     the corp domain. WAN_ISP stays out of OSPF (it's the eBGP edge).
#   - **Mutual redistribution** at the edge:
#       - OSPF → BGP: corp prefixes flow to the ISP.
#       - BGP → OSPF: the default learned from the ISP can be re-originated
#         into OSPF via `default-information originate`.
#   - Outbound NAT disabled (transit firewall behavior).

pfsense_hostname: "pp-external-firewall"
pfsense_domain: "voltgrid.com"

pfsense_interfaces:
  - descr: "WAN_ISP"             # vmx1 — switch-0 transit to pp-isp-router (eBGP)
    interface: vmx1
    enable: true
    ipv4_type: static
    ipv4_address: "75.21.1.1"
    ipv4_prefixlen: 30
    blockpriv: false
    blockbogons: false

  - descr: "DMZ"                 # vmx2 — PP-DMZ subnet gateway (OSPF)
    interface: vmx2
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.8.1"
    ipv4_prefixlen: 24

  - descr: "EDGE_TRANSIT"        # vmx3 — switch-1 transit to site-edge-router (OSPF)
    interface: vmx3
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.0.9"
    ipv4_prefixlen: 30

pfsense_default_gw_name: "GW_ISP"

pfsense_gateways:
  - name: "GW_ISP"
    interface: "WAN_ISP"
    gateway: "75.21.1.2"         # pp-isp-router
  - name: "GW_EDGE_TRANSIT"
    interface: "EDGE_TRANSIT"
    gateway: "172.16.0.10"       # site-edge-router

# OSPF (via area 0) now carries corp /24s into pp-external-firewall, so
# the only static needed is the OT umbrella back-stop — pp-ot-firewall
# is the ESP boundary and doesn't speak OSPF.
pfsense_routes:
  - network: "192.168.0.0/16"
    gateway: "GW_EDGE_TRANSIT"
    descr: "OT umbrella via site-edge-router (ESP boundary)"

pfsense_rules:
  - name: "Allow any on WAN_ISP (lab)"
    interface: "WAN_ISP"
  - name: "Allow any on DMZ (lab)"
    interface: "DMZ"
  - name: "Allow any on EDGE_TRANSIT (lab)"
    interface: "EDGE_TRANSIT"

# OSPF area 0 on the two corp-facing interfaces. The WAN_ISP interface is
# explicitly passive so we don't emit Hellos toward the ISP (eBGP only).
# DMZ network is advertised into OSPF so corp learns the route to pp-www.
pfsense_ospf:
  router_id: "172.16.0.9"
  networks:
    - network: "172.16.8.0/24"    # DMZ
      area: "0.0.0.0"
    - network: "172.16.0.8/30"    # EDGE_TRANSIT transit to site-edge
      area: "0.0.0.0"
  redistribute_static: true        # advertise OT umbrella + any other statics into OSPF
  redistribute_bgp: true           # bring eBGP-learned routes (if any) into corp OSPF
  default_originate: true          # advertise 0.0.0.0/0 into OSPF (corp learns the WAN exit)

# eBGP-only: single peer to pp-isp-router. No iBGP — corp IGP is OSPF.
# `redistribute_ospf: true` pushes corp OSPF prefixes upstream to the ISP
# so return traffic from is-inet finds its way back.
pfsense_bgp:
  asn: 65001
  router_id: "172.16.0.9"
  redistribute_ospf: true
  neighbors:
    - peer_ip: "75.21.1.2"
      remote_as: 65002
      description: "pp-isp-router (eBGP edge — only BGP session in the fabric)"
