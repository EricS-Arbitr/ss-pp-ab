ansible_host: "10.255.240.191"

network_interfaces:
  - name: "eth0"                      # management
    ipv4:
      address: "10.255.240.191"
      netmask: "255.255.240.0"
      type: "ethernet"
  - name: "eth1"                      # PP-DMZ (gateway for DMZ)
    ipv4:
      address: "172.16.8.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth2"                      # switch-1 transit to site-edge-router
    ipv4:
      address: "172.16.0.9"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth3"                      # switch-0 transit to pp-isp-router (external)
    ipv4:
      address: "75.21.1.1"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

static_route:
  - route: "0.0.0.0/0"                # default toward pp-isp-router
    next_hop: "75.21.1.2"

bgp:
  - as: 65001
    neighbor:
      ip: "172.16.0.10"               # site-edge-router
      as: 65001
  - as: 65001
    neighbor:
      ip: "75.21.1.2"                 # pp-isp-router (AS 65002 — external / eBGP)
      as: 65002

source_nat:
  - rule: 10                          # masquerade all internal traffic heading to the internet
    outbound_interface: "eth3"
    source_address: "172.16.0.0/16"
    translation_address: "masquerade"
