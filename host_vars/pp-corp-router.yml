ansible_host: "10.255.240.199"

# SimSpace provisions: eth0 = first data-plane (shared with mgmt 10.255.240.199/20)
network_interfaces:
  - name: "eth0"                      # PP-Services gateway (mgmt shares)
    ipv4:
      address: "172.16.2.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth1"                      # PP-Business-Processing-Department gateway
    ipv4:
      address: "172.16.3.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth2"                      # PP-Eng-Department gateway
    ipv4:
      address: "172.16.4.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth3"                      # PP-LS-Department gateway
    ipv4:
      address: "172.16.5.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth4"                      # PP-IS-Department gateway
    ipv4:
      address: "172.16.6.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth5"                      # switch-10 transit to pp-internal-router
    ipv4:
      address: "172.16.0.42"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

static_route:
  route: "0.0.0.0/0"
  next_hop: "172.16.0.41"             # pp-internal-router (default chain toward pp-isp-router/is-inet)

# SimSpace's VyOS image bakes a `0.0.0.0/0` for each of this host's /24
# interface IPs (eth0-eth4 = .2.1/.3.1/.4.1/.5.1/.6.1). Same self-loop
# pattern as pp-internal-router and pp-isp-router — strip so only the real
# default (0.0.0.0/0 → 172.16.0.41 pp-internal-router) remains.
# See UPSTREAM_FIXES.md (2026-05-27 entry).
extra_static_routes_remove:
  - network: "0.0.0.0/0"
    next_hop: "172.16.2.1"            # own eth0 IP (self-loop)
  - network: "0.0.0.0/0"
    next_hop: "172.16.3.1"            # own eth1 IP (self-loop)
  - network: "0.0.0.0/0"
    next_hop: "172.16.4.1"            # own eth2 IP (self-loop)
  - network: "0.0.0.0/0"
    next_hop: "172.16.5.1"            # own eth3 IP (self-loop)
  - network: "0.0.0.0/0"
    next_hop: "172.16.6.1"            # own eth4 IP (self-loop)

bgp:
  - as: 65001
    neighbor:
      ip: "172.16.0.41"               # pp-internal-router
      as: 65001
