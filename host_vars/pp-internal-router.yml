ansible_host: "10.255.240.192"

# SimSpace provisions: eth0 = first data-plane (shared with mgmt 10.255.240.192/20)
network_interfaces:
  - name: "eth0"                      # pp-security — security subnet gateway (mgmt shares)
    ipv4:
      address: "172.16.9.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth1"                      # switch-10 transit to pp-corp-router
    ipv4:
      address: "172.16.0.41"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth2"                      # switch-3 transit to pp-internal-firewall
    ipv4:
      address: "172.16.0.26"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth3"                      # switch-4 transit to pp-ot-firewall
    ipv4:
      address: "172.16.0.49"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

static_route:
  route: "0.0.0.0/0"
  next_hop: "172.16.0.25"             # pp-internal-firewall (vmx1 INTERNAL on 172.16.0.24/30)

# OT umbrella static — pp-ot-firewall is the ESP boundary and runs no
# routing protocol, so OT prefixes never enter OSPF and must be reached
# statically from here. The customer vyos role's OSPF `redistribute static`
# would push this into the OSPF domain if turned on, but we leave it
# off — each speaker that needs OT reach declares its own back-stop, and
# avoiding redistribute static keeps the default route's authority clean.
extra_static_routes:
  - network: "192.168.0.0/16"
    next_hop: "172.16.0.50"           # pp-ot-firewall (pfSense, ESP boundary)
    descr: "OT umbrella via pp-ot-firewall (ESP boundary, static only)"

# SimSpace's VyOS image bakes `0.0.0.0/0 next-hop 172.16.9.1` (this router's
# own pp-security gateway IP). Two competing equal-cost defaults caused FRR
# to drop the entire 0.0.0.0/0 out of the FIB, breaking corp→DMZ reachability.
# Also strip the historic typo at .26 (own eth2 IP) so only the correct
# default (next-hop 172.16.0.25 = pp-internal-firewall) is configured.
# See UPSTREAM_FIXES.md (2026-05-27 entry).
extra_static_routes_remove:
  - network: "0.0.0.0/0"
    next_hop: "172.16.9.1"            # own eth0 IP (image-baked self-loop)
  - network: "0.0.0.0/0"
    next_hop: "172.16.0.26"            # own eth2 IP (host_vars typo, now fixed to .25)

# Architectural shift 2026-06-10: iBGP removed. Corp IGP is OSPF area 0
# (enabled via `ospf: true` on eth0/eth1/eth2/eth3 above). eBGP is at the
# WAN edge only (pp-external-firewall ↔ pp-isp-router). The overlay's
# "Remove stale VyOS iBGP" play strips legacy `set protocols bgp` config.
remove_vyos_bgp: true
