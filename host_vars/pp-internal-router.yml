ansible_host: "10.255.240.192"

# SimSpace provisions: eth0 = first data-plane (shared with mgmt 10.255.240.192/20)
network_interfaces:
  - name: "eth0"                      # pp-security — security subnet gateway (mgmt shares)
    ipv4:
      address: "172.16.9.1"
      netmask: "255.255.255.0"
      type: "ethernet"
      ospf: true
  - name: "eth1"                      # switch-10 transit to pp-corp-router
    ipv4:
      address: "172.16.0.41"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth2"                      # switch-3 transit to pp-internal-firewall
    ipv4:
      address: "172.16.0.26"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true
  - name: "eth3"                      # switch-4 transit to pp-ot-firewall
    ipv4:
      address: "172.16.0.49"
      netmask: "255.255.255.252"
      type: "ethernet"
      ospf: true

static_route:
  route: "0.0.0.0/0"
  next_hop: "172.16.0.25"             # pp-internal-firewall (vmx1 INTERNAL on 172.16.0.24/30)

# pp-ot-firewall (pfSense 2.8.1) runs FRR/BGP. iBGP delivers its connected
# subnets (172.16.0.48/30, 192.168.200.200/30, 192.168.90.128/27 OT_DMZ)
# but NOT the OT /24-/27s behind pp-ot-router (192.168.95.0/24,
# 192.168.90.0/27, 192.168.90.96/27). Those exist as pfSense-side static
# routes — kernel routes added by pfSense's routing system, never picked
# up by FRR's `redistribute static` (which only catches FRR's own
# `ip route` entries from frr.conf).
#
# Without this back-stop, OT-bound traffic loops between pp-internal-router
# (default → pp-internal-firewall) and pp-internal-firewall (192.168.0.0/16
# → pp-internal-router) until TTL exhaustion.
extra_static_routes:
  - network: "192.168.0.0/16"
    next_hop: "172.16.0.50"           # pp-ot-firewall (pfSense)
    descr: "OT umbrella via pp-ot-firewall (FRR redistribute-static gap)"

# SimSpace's VyOS image bakes `0.0.0.0/0 next-hop 172.16.9.1` (this router's
# own pp-security gateway IP). Two competing equal-cost defaults caused FRR
# to drop the entire 0.0.0.0/0 out of the FIB, breaking corp→DMZ reachability.
# Also strip the historic typo at .26 (own eth2 IP) so only the correct
# default (next-hop 172.16.0.25 = pp-internal-firewall) is configured.
# See UPSTREAM_FIXES.md (2026-05-27 entry).
extra_static_routes_remove:
  - network: "0.0.0.0/0"
    next_hop: "172.16.9.1"            # own eth0 IP (image-baked self-loop)
  - network: "0.0.0.0/0"
    next_hop: "172.16.0.26"            # own eth2 IP (host_vars typo, now fixed to .25)

bgp:
  - as: 65001
    neighbor:
      ip: "172.16.0.42"               # pp-corp-router
      as: 65001
  - as: 65001
    neighbor:
      ip: "172.16.0.25"               # pp-internal-firewall
      as: 65001
  - as: 65001
    neighbor:
      ip: "172.16.0.50"               # pp-ot-firewall
      as: 65001
