ansible_host: "10.255.240.190"

# pfSense 2.8.1 on the new SimSpace pfSense image. NIC ordering (image
# default):
#   vmx0 → mgmt (DHCP from SimSpace platform, becomes 10.255.240.190/20)
#   vmx1 → WAN  (DHCP default, reconfigured static by pfsense_interface)
#   vmx2+ → additional interfaces, all static via pfsense_interface
#
# This box is the OT-side transit firewall between corp (172.16.0.48/30
# toward pp-internal-router) and the OT enclave (pp-ot-router + the
# 192.168.0.0/16 PLC/HMI subnets behind it).
#
# Routing runs on FRR (shipped pre-installed by the new image) via the
# pfsense_firewall role's FRR raw-config task. AS 65001 iBGP peer with
# pp-internal-router; FRR redistribute static + connected propagates the
# OT prefixes (statics below) into the iBGP mesh.

pfsense_hostname: "pp-ot-firewall"
pfsense_domain: "voltgrid.com"

pfsense_interfaces:
  - descr: "WAN_INTERNAL"        # vmx1 — switch-4 transit to pp-internal-router
    interface: vmx1
    enable: true
    ipv4_type: static
    ipv4_address: "172.16.0.50"
    ipv4_prefixlen: 30
    blockpriv: false
    blockbogons: false

  - descr: "OT_TRANSIT"          # vmx2 — switch-8 transit to pp-ot-router
    interface: vmx2
    enable: true
    ipv4_type: static
    ipv4_address: "192.168.200.201"
    ipv4_prefixlen: 30

  - descr: "OT_DMZ"              # vmx3 — PP-OT-DMZ subnet gateway
    interface: vmx3
    enable: true
    ipv4_type: static
    ipv4_address: "192.168.90.129"
    ipv4_prefixlen: 27

pfsense_default_gw_name: "GW_INTERNAL"

pfsense_gateways:
  - name: "GW_INTERNAL"
    interface: "WAN_INTERNAL"
    gateway: "172.16.0.49"       # pp-internal-router
  - name: "GW_OT_ROUTER"
    interface: "OT_TRANSIT"
    gateway: "192.168.200.202"   # pp-ot-router

# OT prefixes behind pp-ot-router. FRR `redistribute static` re-announces
# these into the iBGP mesh, so corp learns OT reachability via BGP without
# any per-/24 statics on the upstream routers.
pfsense_routes:
  - network: "192.168.95.0/24"
    gateway: "GW_OT_ROUTER"
    descr: "OT Gas-Turbine via pp-ot-router"
  - network: "192.168.90.0/27"
    gateway: "GW_OT_ROUTER"
    descr: "OT Gas-Turbine-Sim via pp-ot-router"
  - network: "192.168.90.96/27"
    gateway: "GW_OT_ROUTER"
    descr: "OT PP-OT-Services via pp-ot-router"

pfsense_rules:
  - name: "Allow any on WAN_INTERNAL (lab)"
    interface: "WAN_INTERNAL"
  - name: "Allow any on OT_TRANSIT (lab)"
    interface: "OT_TRANSIT"
  - name: "Allow any on OT_DMZ (lab)"
    interface: "OT_DMZ"

# FRR / BGP config — driven by pfsense_firewall role's FRR task.
# Single iBGP peer toward pp-internal-router (172.16.0.49). `redistribute
# connected` advertises the transit /30s and the OT_DMZ /27; `redistribute
# static` announces the three OT statics above.
pfsense_bgp:
  asn: 65001
  router_id: "172.16.0.50"
  neighbors:
    - peer_ip: "172.16.0.49"
      remote_as: 65001
      description: "pp-internal-router"
