ansible_host: 10.255.240.136

# is-inet is intentionally NOT in [linux] (per CLAUDE.md — specialized
# pre-built appliance, common role would clobber its image-baked config).
# But that also means group_vars/linux.yml's SSH creds don't inherit --
# Ansible was defaulting to root@ with no password and failing with
# "Permission denied (publickey,password)". The image ships the same
# simspace:simspace1 account as other Ubuntu images, so mirror those
# creds here so the email + global_dns plays can reach the box.
ansible_connection: ssh
ansible_user: simspace
ansible_ssh_pass: simspace1
ansible_become_method: sudo
ansible_become_pass: simspace1
ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# --- Data-plane fix consumed by roles/is_inet_fix -----------------------
# RC-IS-INET image ships eth1 as /32 with no default gateway (this repo's
# UPSTREAM_FIXES.md 2026-05-22 entry documented this as "planned but not
# built"). The is_inet_fix role -- authored for airfield-range 2026-07-08
# and back-ported here on 2026-07-09 on branch `is-inet-persistence` --
# drops a netplan supplement using these values so the fix survives
# reboots. The role ALSO supervises unbound inside the is-inet container
# (image entrypoint doesn't launch it; airfield hit this 2026-07-08 and
# PowerPlant's `reload unbound` handler masks the failure with ignore_errors).
isinet_dataplane_ip:      "200.200.200.2"
isinet_dataplane_prefix:  24
isinet_dataplane_gateway: "200.200.200.1"       # pp-isp-router eth0

network_interfaces:
  - name: "Ethernet0"
    ipv4:
      address: "10.255.240.136"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"
    ipv4:
      address: "200.200.200.2"
      netmask: "255.255.255.0"
      gateway: "200.200.200.1"
