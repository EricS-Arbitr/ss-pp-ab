# The customer's vyos role's `static_route` field is a single dict, not a
# list. Hosts that need more than one static route (e.g. pp-internal-router
# after the pp-ot-firewall pfSense swap) declare additional routes here in
# host_vars as `extra_static_routes: [{network, next_hop, descr}]`. The
# role's auto `redistribute static` picks these up into iBGP.
- name: Additional VyOS static routes
  hosts: vyos:vyos_routes_only
  gather_facts: false
  tasks:
    - name: Push extra static routes via vyos_config
      vyos.vyos.vyos_config:
        match: line
        lines:
          - "set protocols static route {{ item.network }} next-hop {{ item.next_hop }}"
        save: true
      loop: "{{ extra_static_routes | default([]) }}"
      when: extra_static_routes is defined and (extra_static_routes | length) > 0
  tags:
    - vyos
    - extra_static_routes

# The SimSpace VyOS image template bakes a stale `0.0.0.0/0 next-hop <X>`
# entry for every /24 "departmental" interface on the box. On routers with
# more than one such interface (pp-internal-router, pp-isp-router,
# pp-corp-router) this creates multiple equal-cost competing default routes
# where the next-hops are the router's OWN connected IPs. FRR refuses to
# install a default whose next-hop resolves to a local interface and ECMPs
# the whole route out of the FIB — leaving the router with no default at
# all. Symptom: `show ip route` has no `S>* 0.0.0.0/0` line; downstream
# subnets get ICMP "Destination net unreachable".
#
# Each affected host declares `extra_static_routes_remove: [{network,
# next_hop}]` in host_vars. This play issues the matching `delete` so the
# only default left is the one the customer `vyos` role just set from
# `static_route`. Logged in UPSTREAM_FIXES.md.
- name: Remove stale VyOS static routes (image-baked self-loop defaults)
  hosts: vyos:vyos_routes_only
  gather_facts: false
  tasks:
    - name: Delete stale static routes via vyos_config
      vyos.vyos.vyos_config:
        match: line
        lines:
          - "delete protocols static route {{ item.network }} next-hop {{ item.next_hop }}"
        save: true
      loop: "{{ extra_static_routes_remove | default([]) }}"
      when: extra_static_routes_remove is defined and (extra_static_routes_remove | length) > 0
  tags:
    - vyos
    - extra_static_routes_remove

