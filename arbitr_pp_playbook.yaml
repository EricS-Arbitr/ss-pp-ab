---
- name: Init
  hosts: windows
  gather_facts: false
  any_errors_fatal: true
  roles:
    - init
  tags:
    - init

- name: Common Role
  hosts: windows,linux
  gather_facts: true
  roles:
    - common
  tags:
    - common

- name: dcpromo
  hosts: pdc
  gather_facts: false
  roles:
    - dcpromo
  tags:
    - dcpromo

- name: Create Users
  hosts: pdc
  gather_facts: false
  roles:
    - create_users
    - group_assignment
  tags:
    - create_users

- name: Additional DC
  hosts: additional_dc
  gather_facts: false
  roles:
    - additional_dc
  tags:
    - additional_dc

- name: dc_status
  hosts: pdc,additional_dc
  gather_facts: false
  roles:
    - dc_status
  tags:
    - dc_status

- name: File Share
  hosts: file
  gather_facts: false
  roles:
    - fileserver
  tags:
    - fileserver

- name: Mapped Drive
  hosts: pdc
  gather_facts: false
  roles:
    - role: mapped_drive
      when: map_drive_letter is defined
  tags:
    - mapped_drive

- name: squid
  hosts: proxy
  gather_facts: false
  become: true
  roles:
    - squid
  tags:
    - squid